  # FailureHandling:
  #   MissingEvidence:
  #     Action: Reinstruct
  #     Threshold: 3
  #   NoProgress:
  #     Action: Abort
  #     Threshold: 3

  Compaction:
    TriggerTurnCount: 30
    KeepRecentTurns: 8
    Mode: lossless

  # ContextBudget: per-agent cumulative input-token thresholds. Warns before
  # context rot sets in, then triggers compaction automatically. Requires Compaction.
