<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Kiwi fruit cross-section -->
  <circle cx="50" cy="50" r="48" fill="#8BC34A"/>
  <circle cx="50" cy="50" r="40" fill="#C8E6C9"/>
  <!-- Seeds radiating from center -->
  <ellipse cx="50" cy="20" rx="4" ry="7" fill="#4E342E" transform="rotate(0 50 50)"/>
  <ellipse cx="50" cy="20" rx="4" ry="7" fill="#4E342E" transform="rotate(45 50 50)"/>
  <ellipse cx="50" cy="20" rx="4" ry="7" fill="#4E342E" transform="rotate(90 50 50)"/>
  <ellipse cx="50" cy="20" rx="4" ry="7" fill="#4E342E" transform="rotate(135 50 50)"/>
  <ellipse cx="50" cy="20" rx="4" ry="7" fill="#4E342E" transform="rotate(180 50 50)"/>
  <ellipse cx="50" cy="20" rx="4" ry="7" fill="#4E342E" transform="rotate(225 50 50)"/>
  <ellipse cx="50" cy="20" rx="4" ry="7" fill="#4E342E" transform="rotate(270 50 50)"/>
  <ellipse cx="50" cy="20" rx="4" ry="7" fill="#4E342E" transform="rotate(315 50 50)"/>
  <!-- Center -->
  <circle cx="50" cy="50" r="8" fill="#8BC34A"/>
</svg>
